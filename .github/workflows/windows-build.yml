name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  advisories:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Audit Windows dependencies
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          rust-version: "1.97.1"
          command: check advisories
          arguments: --locked --target x86_64-pc-windows-msvc

  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.97.1
          components: clippy,rustfmt

      - name: Format
        run: cargo fmt --all --check

      - name: Check
        run: cargo check --locked

      - name: Test
        run: cargo test --locked

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build release package
        shell: pwsh
        run: .\build_release.ps1

      - name: Smoke test executable
        shell: pwsh
        run: |
          .\dist\RunScope.exe --version
          if ($LASTEXITCODE -ne 0) {
              throw "RunScope --version failed with exit code $LASTEXITCODE"
          }
          .\dist\RunScope.exe --self-check
          if ($LASTEXITCODE -ne 0) {
              throw "RunScope --self-check failed with exit code $LASTEXITCODE"
          }

      - name: Upload executable package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: RunScope-windows-x64
          path: |
            dist/RunScope.exe
            dist/RunScope-windows-x64.zip
            dist/SHA256SUMS.txt
