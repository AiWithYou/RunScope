name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Format
        run: cargo fmt --all --check

      - name: Check
        run: cargo check

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build release package
        shell: pwsh
        run: .\build_release.ps1

      - name: Smoke test executable
        shell: pwsh
        run: |
          .\dist\RunScope.exe --version
          .\dist\RunScope.exe --self-check

      - name: Upload executable package
        uses: actions/upload-artifact@v4
        with:
          name: RunScope-windows-x64
          path: |
            dist/RunScope.exe
            dist/RunScope-windows-x64.zip
            dist/SHA256SUMS.txt
